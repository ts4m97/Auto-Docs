name: Bug report
description: Report something that is not working correctly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Auto Docs. Please remove any confidential document data before attaching files.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Auto Docs failed to export a DOCX after importing an Excel file...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Import template...
        2. Import Excel...
        3. Click Export...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 1.0.0
  - type: dropdown
    id: windows
    attributes:
      label: Windows version
      options:
        - Windows 11
        - Windows 10
        - Other
  - type: textarea
    id: notes
    attributes:
      label: Notes, logs, or screenshots

